<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 440px; height: 280px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif; }
body {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #6366f1 0%, #a855f7 60%, #ec4899 100%);
  color: #fff; text-align: center; padding: 24px;
}
.logo {
  width: 72px; height: 72px; border-radius: 18px;
  background: rgba(255,255,255,.18); backdrop-filter: blur(8px);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  font-weight: 800; font-size: 38px; letter-spacing: -.05em;
}
h1 { margin: 0 0 6px; font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
p { margin: 0; font-size: 14px; opacity: .92; font-weight: 500; max-width: 360px; }
.sparkle { font-size: 14px; margin-top: 12px; opacity: .85; font-weight: 500; }
</style></head>
<body>
  <div class="logo">S</div>
  <h1>AI Summarizer</h1>
  <p>Summarize any video, article, or PDF in seconds.</p>
  <div class="sparkle">✨ Gemini · ChatGPT · Claude</div>
</body></html>
