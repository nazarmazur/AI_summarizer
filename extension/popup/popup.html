<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <title data-i18n="extName">AI Summarizer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Top toolbar: language / length / model / account / settings -->
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="chip chip-lang" id="langChip" type="button" title="" data-i18n-attr="title:selectLanguage">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M5 4h6v2H5zm6 4h2v3h3v2h-3v3h-2v-3H8V8h3zM5 18l3.5-9h2L14 18h-2l-.7-2h-4L6.6 18zm3.4-4h3.2L10 9.6z"/>
        </svg>
        <span id="langChipLabel">Українська</span>
        <svg viewBox="0 0 24 24" width="12" height="12" class="caret"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
      </button>

      <button class="chip chip-length" id="lengthChip" type="button" title="" data-i18n-attr="title:selectLength">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M3 6h14v2H3zm0 5h10v2H3zm0 5h7v2H3zm17-7h-2v8a3 3 0 0 0 3 3v-2a1 1 0 0 1-1-1z"/>
        </svg>
        <span id="lengthChipLabel" data-i18n="lengthShort">Краткая</span>
        <svg viewBox="0 0 24 24" width="12" height="12" class="caret"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
      </button>
    </div>

    <div class="toolbar-right">
      <button class="icon-btn" id="historyBtn" type="button" title="" data-i18n-attr="title:tabHistory">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1l4 4 4-4H6a7 7 0 1 1 7 7v2a9 9 0 0 0 0-18zm-1 5v5l4.25 2.52.75-1.23-3.5-2.08V8z"/>
        </svg>
      </button>
      <button class="icon-btn" id="accountBtn" type="button" title="" data-i18n-attr="title:optionsAuth">
        <span class="dot" id="accountDot"></span>
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" type="button" title="" data-i18n-attr="title:saveSettings">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M19.14 12.94a7.07 7.07 0 0 0 0-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.66 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.07 7.07 0 0 0 0 1.88L2.78 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96a7 7 0 0 0 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Model picker row, mimics the screenshot's "Auто [New]" with tooltip -->
  <div class="model-row">
    <button class="chip chip-model" id="modelChip" type="button" title="" data-i18n-attr="title:selectModelTooltip">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
        <path d="M12 4v3M12 17v3M4 12h3M17 12h3M6.34 6.34l2.12 2.12M15.54 15.54l2.12 2.12M6.34 17.66l2.12-2.12M15.54 8.46l2.12-2.12" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
      <span id="modelChipLabel" data-i18n="modelAuto">Авто</span>
      <span class="badge badge-new" data-i18n="badgeNew">New</span>
      <svg viewBox="0 0 24 24" width="12" height="12" class="caret"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
    </button>

    <button class="chip chip-template" id="templateChip" type="button" title="" data-i18n-attr="title:tplPickerTooltip">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path fill="currentColor" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm0 7V3.5L19.5 9H14z"/>
      </svg>
      <span id="templateChipLabel" data-i18n="tplStandard">Standard</span>
      <svg viewBox="0 0 24 24" width="12" height="12" class="caret"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
    </button>
  </div>

  <!-- URL bar -->
  <div class="url-row">
    <button class="icon-btn url-pdf-btn" id="pdfPickBtn" type="button" title="" data-i18n-attr="title:pickPdf">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M19.35 10.04A7.49 7.49 0 0 0 12 4a7.5 7.5 0 0 0-6.94 4.61A5.99 5.99 0 0 0 6 20h13a5 5 0 0 0 .35-9.96zM14 13v4h-4v-4H7l5-5 5 5z"/>
      </svg>
    </button>
    <input type="file" id="pdfFileInput" accept="application/pdf,.pdf" hidden />
    <input type="text" id="urlInput" data-i18n-attr="placeholder:contentUrlPlaceholder" />
    <button class="round-btn" id="runBtn" type="button" title="" data-i18n-attr="title:btnSummarize">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M3 12l18-8-8 18-2-7z"/>
      </svg>
    </button>
  </div>

  <!-- Detected source type indicator (video/article/pdf/social) -->
  <div class="src-row" id="srcRow" hidden>
    <span class="src-chip" id="srcChip">
      <svg viewBox="0 0 24 24" width="12" height="12" id="srcIcon"><path fill="currentColor" d=""/></svg>
      <span id="srcLabel"></span>
    </span>
  </div>

  <!-- Action tiles -->
  <div class="tiles">
    <button class="tile tile-summary" data-kind="summary" type="button">
      <span class="tile-label" data-i18n="tabSummary">Сводка</span>
      <svg viewBox="0 0 24 24" width="16" height="16" class="tile-icon">
        <path fill="url(#g1)" d="M12 2l1.7 4.6L18 8l-4.3 1.4L12 14l-1.7-4.6L6 8l4.3-1.4z"/>
        <path fill="url(#g1)" d="M5 14l1 2.7 2.7 1L6 18.7 5 21l-1-2.3L1 18l2.7-1z"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
      </svg>
    </button>
    <button class="tile tile-timestamps" data-kind="timestamps" data-pro-feature="timestamps" type="button">
      <span class="tile-label" data-i18n="tabTimestamps">Тайм-коди</span>
      <svg viewBox="0 0 24 24" width="16" height="16" class="tile-icon">
        <circle cx="12" cy="12" r="9" fill="none" stroke="#6b7280" stroke-width="1.6"/>
        <path d="M12 7v5l3 2" fill="none" stroke="#6b7280" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="badge badge-pro lock-badge" data-i18n="badgePro" hidden>PRO</span>
    </button>
  </div>

  <!-- Result panel -->
  <main class="result" id="result" hidden>
    <div class="result-head">
      <h2 id="resultHeader" data-i18n="summaryHeader">Підсумок</h2>
      <div class="result-actions">
        <button class="icon-mini is-stop" id="stopBtn" type="button" title="" data-i18n-attr="title:btnStop" hidden>
          <svg viewBox="0 0 24 24" width="14" height="14"><rect x="5" y="5" width="14" height="14" rx="2" fill="currentColor"/></svg>
        </button>
        <button class="icon-mini" id="regenBtn" type="button" title="" data-i18n-attr="title:btnRegenerate">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M17.65 6.35A8 8 0 1 0 19.74 14h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4z"/></svg>
        </button>
        <button class="icon-mini" id="copyBtn" type="button" title="" data-i18n-attr="title:btnCopy">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11z"/></svg>
        </button>
        <button class="icon-mini" id="downloadBtn" type="button" title="" data-i18n-attr="title:btnDownloadMd">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        </button>
      </div>
    </div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="banner" id="fallbackBanner" hidden></div>
    <article id="resultBody" class="markdown"></article>

    <!-- Follow-up chat -->
    <div class="chat" id="chat" hidden>
      <div class="chat-history" id="chatHistory"></div>
      <form class="chat-form" id="chatForm" autocomplete="off">
        <input type="text" id="chatInput" data-i18n-attr="placeholder:chatPlaceholder" />
        <button type="submit" class="chat-send" id="chatSendBtn" data-i18n-attr="title:chatSend" title="">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M3 12l18-8-8 18-2-7z"/></svg>
        </button>
      </form>
    </div>
  </main>

  <!-- Loading / error states -->
  <main class="state" id="loading" hidden>
    <div class="spinner"></div>
    <p id="loadingLabel" data-i18n="loadingTranscript">Завантаження…</p>
    <div class="progress" id="loadingProgress" hidden>
      <div class="progress-bar" id="loadingProgressBar"></div>
    </div>
  </main>

  <main class="state state-error" id="error" hidden>
    <p id="errorText"></p>
    <div class="state-actions">
      <button class="btn" id="errorActionBtn" hidden></button>
    </div>
  </main>

  <main class="state state-empty" id="empty">
    <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
      <rect x="6" y="14" width="52" height="36" rx="6" fill="#ede9fe"/>
      <path d="M26 24l16 8-16 8z" fill="#8b5cf6"/>
    </svg>
    <p data-i18n="notOnYouTube">Відкрийте відео на YouTube або вставте URL.</p>
  </main>

  <!-- ===================== Dropdown menus ===================== -->
  <div class="menu" id="langMenu" hidden></div>
  <div class="menu" id="lengthMenu" hidden>
    <button class="menu-item menu-item-rich" data-value="short">
      <span class="mi-title" data-i18n="lengthShort">Коротка</span>
      <span class="mi-sub" data-i18n="lengthShortDesc">Тільки основні пункти</span>
    </button>
    <button class="menu-item menu-item-rich" data-value="medium">
      <span class="mi-title" data-i18n="lengthMedium">Середня</span>
      <span class="mi-sub" data-i18n="lengthMediumDesc">Ключові моменти з контекстом</span>
    </button>
    <button class="menu-item menu-item-rich" data-value="long">
      <span class="mi-title" data-i18n="lengthLong">Детальна</span>
      <span class="mi-sub" data-i18n="lengthLongDesc">Повний хронологічний розбір</span>
    </button>
  </div>
  <div class="menu" id="templateMenu" hidden></div>
  <!-- Model menu is built dynamically from MODELS in lib/config.js -->
  <div class="menu menu-grouped" id="modelMenu" hidden></div>

  <!-- ===================== Upsell modal ===================== -->
  <div class="modal" id="upsellModal" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-card">
      <button class="modal-x" data-modal-close type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg>
      </button>
      <div class="modal-head">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="url(#g2)" d="M12 2l1.7 4.6L18 8l-4.3 1.4L12 14l-1.7-4.6L6 8l4.3-1.4z"/><path fill="url(#g2)" d="M5 14l1 2.7 2.7 1L6 18.7 5 21l-1-2.3L1 18l2.7-1z"/><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs></svg>
        </div>
        <h2 data-i18n="upsellTitle">Upgrade to AI Summarizer Pro</h2>
        <p data-i18n="upsellSubtitle"></p>
      </div>
      <ul class="feat-list">
        <li><span class="feat-check">✓</span><span data-i18n="featTimestamps"></span></li>
        <li><span class="feat-check">✓</span><span data-i18n="featPremiumModels"></span></li>
        <li><span class="feat-check">✓</span><span data-i18n="featLongVideos"></span></li>
        <li><span class="feat-check">✓</span><span data-i18n="featCustomPrompts"></span></li>
        <li><span class="feat-check">✓</span><span data-i18n="featExport"></span></li>
        <li><span class="feat-check">✓</span><span data-i18n="featUnlimitedHistory"></span></li>
        <li><span class="feat-check">✓</span><span data-i18n="featPoolApi"></span></li>
      </ul>
      <div class="price-row" role="radiogroup">
        <label class="price-card">
          <input type="radio" name="ais-plan" value="monthly" />
          <div class="price-card-inner">
            <span class="price-title" data-i18n="billedMonthly">Monthly</span>
            <span class="price-amount">$4.99 <span data-i18n="perMonth">/ mo</span></span>
          </div>
        </label>
        <label class="price-card is-selected">
          <input type="radio" name="ais-plan" value="yearly" checked />
          <div class="price-card-inner">
            <span class="price-title" data-i18n="billedYearly">Yearly</span>
            <span class="price-amount">$39 <span data-i18n="perYear">/ yr</span></span>
            <span class="price-save" data-i18n="priceYearSaves">Save 35%</span>
          </div>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="upsellCloseBtn" data-modal-close type="button" data-i18n="btnNotNow">Not now</button>
        <button class="btn btn-primary" id="upsellGoBtn" type="button" data-i18n="btnStartTrial">Start 7-day free trial</button>
      </div>
      <p class="modal-fineprint">$4.99/mo · <span data-i18n="trialFinePrintShort">7 days free, cancel anytime.</span></p>
    </div>
  </div>

  <script src="../lib/i18n.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
